services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    volumes:
      - ./backend:/app
      - backend_bundle:/usr/local/bundle
      - backend_db:/app/db/sqlite
    environment:
      - RAILS_ENV=development
      - DATABASE_PATH=/app/db/sqlite/development.sqlite3
      - CRICAPI_KEY=2cb359a1-1edc-457b-99fc-82e8a1fc6b47
    command: bash -c "rm -f tmp/pids/server.pid && bundle exec rails db:prepare && bundle exec rails server -b 0.0.0.0"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - VITE_API_URL=http://localhost:3001
    command: npm run dev -- --host 0.0.0.0
    depends_on:
      - backend

volumes:
  backend_bundle:
  backend_db:
  frontend_node_modules:
